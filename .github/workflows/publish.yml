name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build
        run: uv build --no-sources

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with dist/*.whl -- python -c "import slopmeter; print('wheel ok')"

      - name: Smoke test sdist
        run: uv run --isolated --no-project --with dist/*.tar.gz -- python -c "import slopmeter; print('sdist ok')"

      - name: Publish
        run: uv publish

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes
          fi
